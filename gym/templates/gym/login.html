{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Member Login - FitnessHub{% endblock %}

{% block content %}
<section class="section-padding min-vh-100 d-flex align-items-center">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-5 col-md-8">
                <div class="card shadow-lg border-0 bg-black overflow-hidden">
                    <div class="card-header bg-primary-theme text-white py-4 text-center border-0">
                        <h3 class="fw-bold text-uppercase mb-0 tracking-widest">Welcome Back</h3>
                        <p class="small mb-0 opacity-75 mt-2">Enter your credentials to access your account</p>
                    </div>
                    <div class="card-body p-5">
                        <form method="post" novalidate>
                            {% csrf_token %}
                            <div class="mb-3 custom-crispy-dark">
                                {{ form|crispy }}
                            </div>
                            <div class="d-grid gap-2 mt-5">
                                <button type="submit" class="btn btn-primary-theme text-white btn-lg py-3 rounded-pill fw-bold text-uppercase">Log In</button>
                            </div>
                        </form>
                        <div class="mt-4 text-center">
                            <p class="text-secondary small">
                                Don't have an account? <a href="{% url 'register' %}" class="text-primary-theme fw-bold text-decoration-none">JOIN NOW</a>
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
