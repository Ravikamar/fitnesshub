{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Login - FitnessHub{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-dark text-white py-3 text-center">
                <h4 class="mb-0">Member Login</h4>
            </div>
            <div class="card-body p-4">
                <form method="post" novalidate>
                    {% csrf_token %}
                    {{ form|crispy }}
                    <div class="d-grid gap-2 mt-4">
                        <button type="submit" class="btn btn-dark btn-lg">Login</button>
                    </div>
                </form>
                <div class="mt-3 text-center">
                    <small class="text-muted">
                        Don't have an account? <a href="{% url 'register' %}" class="text-primary fw-bold">Sign Up</a>
                    </small>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
